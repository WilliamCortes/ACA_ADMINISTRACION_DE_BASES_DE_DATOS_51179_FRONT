<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library — Libros</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div class="brand">Library <span>API</span></div>
  <nav class="mt-2">
    <a href="index.html" class="active"><i class="bi bi-book"></i> Libros</a>
    <a href="users.html"><i class="bi bi-people"></i> Usuarios</a>
    <a href="borrows.html"><i class="bi bi-arrow-left-right"></i> Préstamos</a>
  </nav>
</div>

<!-- Content -->
<div id="content">

  <!-- Stats row -->
  <div class="row g-3 mb-4" id="stats-row">
    <div class="col-sm-4">
      <div class="stat-card" style="background: linear-gradient(135deg,#6366f1,#8b5cf6);">
        <i class="bi bi-book-half"></i>
        <div>
          <div class="val" id="stat-books">–</div>
          <div class="lbl">Libros</div>
        </div>
      </div>
    </div>
    <div class="col-sm-4">
      <div class="stat-card" style="background: linear-gradient(135deg,#0ea5e9,#38bdf8);">
        <i class="bi bi-people-fill"></i>
        <div>
          <div class="val" id="stat-users">–</div>
          <div class="lbl">Usuarios</div>
        </div>
      </div>
    </div>
    <div class="col-sm-4">
      <div class="stat-card" style="background: linear-gradient(135deg,#10b981,#34d399);">
        <i class="bi bi-arrow-left-right"></i>
        <div>
          <div class="val" id="stat-borrows">–</div>
          <div class="lbl">Préstamos activos</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Page header -->
  <div class="page-header">
    <h2><i class="bi bi-book me-2"></i>Libros</h2>
    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalBook" onclick="openCreate()">
      <i class="bi bi-plus-lg me-1"></i>Nuevo libro
    </button>
  </div>

  <!-- Search -->
  <div class="search-wrap mb-3" style="max-width:320px">
    <i class="bi bi-search"></i>
    <input id="search-input" type="text" class="form-control form-control-sm" placeholder="Buscar por título o autor…" oninput="filterBooks()" />
  </div>

  <!-- Book grid -->
  <div class="row g-3" id="books-grid">
    <div class="col-12 text-center py-5 text-muted">
      <div class="spinner-border text-primary" role="status"></div>
    </div>
  </div>
</div>

<!-- Alert box -->
<div id="alert-box"></div>

<!-- Modal Libro -->
<div class="modal fade" id="modalBook" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-book-title">Nuevo libro</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="book-id" />
        <div class="mb-2">
          <label class="form-label fw-semibold">Título *</label>
          <input id="b-title" class="form-control" required />
        </div>
        <div class="mb-2">
          <label class="form-label fw-semibold">Autor *</label>
          <input id="b-author" class="form-control" required />
        </div>
        <div class="row g-2 mb-2">
          <div class="col">
            <label class="form-label fw-semibold">Año publicación</label>
            <input id="b-year" class="form-control" type="number" min="1000" max="2099" />
          </div>
          <div class="col">
            <label class="form-label fw-semibold">Stock *</label>
            <input id="b-stock" class="form-control" type="number" min="0" value="1" required />
          </div>
        </div>
        <div class="mb-2">
          <label class="form-label fw-semibold">Descripción</label>
          <textarea id="b-desc" class="form-control" rows="2"></textarea>
        </div>
        <div class="mb-2">
          <label class="form-label fw-semibold">URL portada</label>
          <input id="b-cover" class="form-control" type="url" placeholder="https://…" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary btn-sm" onclick="saveBook()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal detalle / eliminar -->
<div class="modal fade" id="modalDetail" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Eliminar libro</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>¿Seguro que quieres eliminar <strong id="del-book-name"></strong>?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete()">Eliminar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/books.js"></script>
</body>
</html>
