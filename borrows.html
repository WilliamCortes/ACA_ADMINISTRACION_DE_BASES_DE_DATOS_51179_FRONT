<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library — Préstamos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="sidebar">
  <div class="brand">Library <span>API</span></div>
  <nav class="mt-2">
    <a href="index.html"><i class="bi bi-book"></i> Libros</a>
    <a href="users.html"><i class="bi bi-people"></i> Usuarios</a>
    <a href="borrows.html" class="active"><i class="bi bi-arrow-left-right"></i> Préstamos</a>
  </nav>
</div>

<div id="content">

  <div class="page-header">
    <h2><i class="bi bi-arrow-left-right me-2"></i>Préstamos</h2>
    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalBorrow">
      <i class="bi bi-plus-lg me-1"></i>Nuevo préstamo
    </button>
  </div>

  <!-- Filter tabs -->
  <div class="d-flex gap-2 mb-3 flex-wrap">
    <button class="btn btn-sm btn-primary filter-btn active" data-status="">Todos</button>
    <button class="btn btn-sm btn-outline-primary filter-btn" data-status="BORROWED">Prestados</button>
    <button class="btn btn-sm btn-outline-warning filter-btn" data-status="LATE">Tardíos</button>
    <button class="btn btn-sm btn-outline-success filter-btn" data-status="RETURNED">Devueltos</button>
  </div>

  <!-- Table -->
  <div class="tbl-wrapper">
    <table class="table table-hover mb-0">
      <thead>
        <tr>
          <th>#</th>
          <th>Usuario</th>
          <th>Libro</th>
          <th>Prestado</th>
          <th>Vence</th>
          <th>Devuelto</th>
          <th>Estado</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="borrows-body">
        <tr><td colspan="8" class="text-center py-4">
          <div class="spinner-border text-primary" role="status"></div>
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="alert-box"></div>

<!-- Modal Nuevo préstamo -->
<div class="modal fade" id="modalBorrow" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nuevo préstamo</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-2">
          <label class="form-label fw-semibold">Usuario *</label>
          <select id="b-user" class="form-select">
            <option value="">Cargando…</option>
          </select>
        </div>
        <div class="mb-2">
          <label class="form-label fw-semibold">Libro *</label>
          <select id="b-book" class="form-select">
            <option value="">Cargando…</option>
          </select>
        </div>
        <div class="mb-2">
          <label class="form-label fw-semibold">Fecha límite *</label>
          <input id="b-due" class="form-control" type="date" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary btn-sm" onclick="saveBorrow()">Crear préstamo</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/borrows.js"></script>
</body>
</html>
