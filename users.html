<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library — Usuarios</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="sidebar">
  <div class="brand">Library <span>API</span></div>
  <nav class="mt-2">
    <a href="index.html"><i class="bi bi-book"></i> Libros</a>
    <a href="users.html" class="active"><i class="bi bi-people"></i> Usuarios</a>
    <a href="borrows.html"><i class="bi bi-arrow-left-right"></i> Préstamos</a>
  </nav>
</div>

<div id="content">

  <div class="page-header">
    <h2><i class="bi bi-people me-2"></i>Usuarios</h2>
    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalUser" onclick="openCreate()">
      <i class="bi bi-plus-lg me-1"></i>Nuevo usuario
    </button>
  </div>

  <!-- Search -->
  <div class="search-wrap mb-3" style="max-width:320px">
    <i class="bi bi-search"></i>
    <input id="search-input" type="text" class="form-control form-control-sm" placeholder="Buscar por nombre o documento…" oninput="filterUsers()" />
  </div>

  <!-- Table -->
  <div class="tbl-wrapper">
    <table class="table table-hover mb-0" id="users-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Documento</th>
          <th>Email</th>
          <th>Teléfono</th>
          <th>Dirección</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="users-body">
        <tr><td colspan="7" class="text-center py-4">
          <div class="spinner-border text-primary" role="status"></div>
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="alert-box"></div>

<!-- Modal Usuario -->
<div class="modal fade" id="modalUser" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-user-title">Nuevo usuario</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="user-id" />
        <div class="mb-2">
          <label class="form-label fw-semibold">Nombre *</label>
          <input id="u-name" class="form-control" required />
        </div>
        <div class="mb-2">
          <label class="form-label fw-semibold">Documento *</label>
          <input id="u-doc" class="form-control" required />
        </div>
        <div class="mb-2">
          <label class="form-label fw-semibold">Email *</label>
          <input id="u-email" class="form-control" type="email" required />
        </div>
        <div class="mb-2">
          <label class="form-label fw-semibold">Teléfono</label>
          <input id="u-phone" class="form-control" />
        </div>
        <div class="mb-2">
          <label class="form-label fw-semibold">Dirección</label>
          <input id="u-address" class="form-control" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary btn-sm" onclick="saveUser()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Eliminar -->
<div class="modal fade" id="modalDelete" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Eliminar usuario</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>¿Seguro que quieres eliminar a <strong id="del-user-name"></strong>?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete()">Eliminar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/users.js"></script>
</body>
</html>
